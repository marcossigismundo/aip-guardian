{# Language dropdown partial — POST to /set-language #}

<div x-data="langSwitcher()" class="relative">
    <button @click="open = !open" @click.outside="open = false"
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium
                   text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700
                   transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500"
            type="button" aria-haspopup="true" :aria-expanded="open">
        {# Globe icon #}
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5a17.92 17.92 0 0 1-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418" />
        </svg>
        <span>{{ supported_languages.get(current_lang, 'English') }}</span>
        <svg class="h-3 w-3 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
        </svg>
    </button>

    <div x-show="open" x-transition:enter="transition ease-out duration-100"
         x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
         class="absolute right-0 z-50 mt-2 w-40 origin-top-right rounded-xl bg-white shadow-lg
                ring-1 ring-black/5 dark:bg-slate-800 dark:ring-white/10"
         style="display: none;">
        <div class="py-1">
            {% for code, name in supported_languages.items() %}
            <form method="post" action="/set-language" class="block">
                <input type="hidden" name="language" value="{{ code }}">
                <button type="submit"
                        class="flex w-full items-center gap-2 px-4 py-2 text-sm
                               {% if code == current_lang %}
                               bg-indigo-50 text-indigo-700 font-medium dark:bg-indigo-900/30 dark:text-indigo-300
                               {% else %}
                               text-slate-700 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-700
                               {% endif %}
                               transition-colors">
                    {% if code == 'en' %}
                    <span class="text-base">EN</span>
                    {% elif code == 'es' %}
                    <span class="text-base">ES</span>
                    {% endif %}
                    <span>{{ name }}</span>
                    {% if code == current_lang %}
                    <svg class="ml-auto h-4 w-4 text-indigo-600 dark:text-indigo-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                    {% endif %}
                </button>
            </form>
            {% endfor %}
        </div>
    </div>
</div>
