name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
      - name: Lint with ruff
        run: ruff check src/ tests/
      - name: Type check with mypy
        run: mypy src/guardian/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: guardian_test
          POSTGRES_USER: guardian
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (SQLite)
        run: pytest tests/ -v --tb=short

      - name: Run tests (PostgreSQL)
        env:
          TEST_DATABASE_URL: "postgresql+asyncpg://guardian:testpassword@localhost:5432/guardian_test"
          GUARDIAN_DEBUG: "true"
          GUARDIAN_SECRET_KEY: "ci-test-key-not-for-production"
          GUARDIAN_API_TOKEN: "ci-test-token-not-for-production"
        run: pytest tests/ -v --tb=short -m "not slow"

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t aip-guardian:test .
      - name: Verify image starts
        run: |
          docker run --rm -d --name guardian-test \
            -e GUARDIAN_DEBUG=true \
            -e DATABASE_URL=sqlite+aiosqlite:/// \
            aip-guardian:test sleep 10
          docker stop guardian-test || true
